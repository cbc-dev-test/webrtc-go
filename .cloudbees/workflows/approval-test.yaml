name: approval-test
apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
on:
  workflow_dispatch:
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write
jobs:
  scan-and-evaluate:
    outputs:
      policy-subject: ${{ steps.transform-input.outputs.policy-subject }}
    steps:
      - name: Checkout Source Code
        uses: cloudbees-io/checkout@v1

      - name: Run Sonar Scan
        id: sonar-step
        uses: cloudbees-io/sonarqube-plugin@v1.0.5
        with:
          url: ${{ vars.SONAR_URL }}
          username: ${{ vars.SONAR_USERNAME }}
          password: ${{ secrets.SONAR_PASSWORD }}
          
          
      - id: print-outputs-from-sonar-step
        name: Print Outputs From Upstream Sonar Step
        uses: docker://alpine:latest
        run: |
          echo "Outputs from upstream Sonar step:"
          echo "Critical count: ${{ steps.sonar-step.outputs.critical-count }}"
          echo "Very high count: ${{ steps.sonar-step.outputs.very-high-count }}"
          echo "High count: ${{ steps.sonar-step.outputs.high-count }}"
          echo "Medium count: ${{ steps.sonar-step.outputs.medium-count }}"
          echo "Low count: ${{ steps.sonar-step.outputs.low-count }}"
      
      # Transform sonar output to policy engine JSON
      #   critical-count + very-high-count → CRITICAL
      #   high-count → HIGH
      #   medium-count → MEDIUM
      - id: transform-input
        name: Transform sonar output to policy input
        uses: docker://alpine:latest
        shell: sh
        run: |
          CRITICAL=$(( ${{ steps.sonar-step.outputs.critical-count }} + ${{ steps.sonar-step.outputs.very-high-count }} ))
          HIGH=${{ steps.sonar-step.outputs.high-count }}
          MEDIUM=${{ steps.sonar-step.outputs.medium-count }}
          TOTAL=$(( $CRITICAL + $HIGH + $MEDIUM ))
          cat > "$CLOUDBEES_OUTPUTS/policy-subject" << EOF
          [{
            "type": "vulnerability_scan",
            "data": {
              "summary": {
                "by_severity": {
                  "total": ${TOTAL},
                  "critical": ${CRITICAL},
                  "high": ${HIGH},
                  "medium": ${MEDIUM},
                  "low": 0
                }
              }
            }
          }]
          EOF

      - name: Print policy input
        uses: docker://alpine:latest
        shell: sh
        env:
          ORG: ${{ cloudbees.org.id }}
          ACCESS_KEY: ${{ cloudbees.api.token }}
          URL: ${{ cloudbees.api.url }}
        run: |
          echo "$URL"
          echo "$ORG"
          echo "Authorization: Bearer $ACCESS_KEY"
          cat /cloudbees/workspace/policy-input.json
  policy-evaluation:
    uses: cloudbees-io/policy-check/workflow.yml@CBP-42797
    needs:
      - scan-and-evaluate
    with:
      policy-id: 935f59c8-4b21-4051-81b4-0d83d280d60d
      input-data: ${{ needs.scan-and-evaluate.outputs.policy-subject }}