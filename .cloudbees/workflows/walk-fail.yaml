name: walk-fail
apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
on:
  workflow_dispatch:
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write
jobs:
  scan-and-evaluate:
    steps:
      - name: Checkout Source Code
        uses: cloudbees-io/checkout@v1

      - name: Run Gosec Scan
        id: gosec-step
        uses: cloudbees-io/gosec-plugin@v1

      - id: print-gosec-outputs
        name: Print gosec outputs
        uses: docker://alpine:latest
        run: |
          echo "Gosec outputs:"
          echo "Critical: ${{ steps.gosec-step.outputs.critical-count }}"
          echo "Very high: ${{ steps.gosec-step.outputs.very-high-count }}"
          echo "High: ${{ steps.gosec-step.outputs.high-count }}"
          echo "Medium: ${{ steps.gosec-step.outputs.medium-count }}"
          echo "Low: ${{ steps.gosec-step.outputs.low-count }}"
          echo "Policy Subject: ${{ steps.gosec-step.outputs.policy-subject }}"

      - name: Print policy input
        uses: docker://alpine:latest
        shell: sh
        env:
          ORG: ${{ cloudbees.org.id }}
          ACCESS_KEY: ${{ cloudbees.api.token }}
          URL: ${{ cloudbees.api.url }}
          SUBJECT: ${{ steps.gosec-step.outputs.policy-subject }}
        run: |
          echo "$URL"
          echo "$ORG"
          echo "Authorization: Bearer $ACCESS_KEY"
          echo "$SUBJECT"

      - name: Run policy check
        id: policy-check
        uses: cloudbees-io/policy-check@v1.0.1
        with:
          policy: 22f76106-3661-409f-b654-42ab4a052fe4
          input-data: ${{ steps.gosec-step.outputs.policy-subject }}
