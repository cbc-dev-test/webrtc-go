apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: jfrog download
on:
  workflow_dispatch: {}
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write
jobs:
  download-and-evaluate:
    steps:
      - name: jfrog-actions-workflow-download
        uses: cloudbees-io/jfrog-artifactory-download-file@v1
        with:
          url: ${{ vars.JFROG_URL }}
          username: ${{ vars.JFROG_ACTIONS_USERNAME }}
          password: ${{ secrets.JFROG_ACTIONS_PASSWORD }}
          file-path: download/test-image
          artifactory-path: artifactory/test-image/1.11/manifest.json

      # Printing policy subject details for testing purpose
      - id: print-download-file
        name: Print download file
        uses: docker://alpine:latest
        run: |

          echo "=== Files in /cloudbees/workspace/download/test-image ==="                                                                                                                              
          find "/cloudbees/workspace/download/test-image" -type f | while read file; do                                                                                                               
            echo ""                                                                                                                                                               
            echo "File: $file"                                                                                                                                                    
            # cat "$file"                                                                                                                                                           
            echo "---"                                                                                                                                                            
          done