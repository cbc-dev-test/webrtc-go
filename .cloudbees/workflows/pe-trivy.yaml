apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: pe-trivy
on:
  workflow_dispatch: {}
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write
jobs:
  download-and-evaluate:
    steps:
      - name: jfrog-actions-workflow-download
        uses: cloudbees-io/jfrog-artifactory-download-file@v1
        with:
          url: ${{ vars.JFROG_URL }}
          username: ${{ vars.JFROG_ACTIONS_USERNAME }}
          password: ${{ secrets.JFROG_ACTIONS_PASSWORD }}
          file-path: /cloudbees/workspace/golang-alpine.tar
          artifactory-path: test-generic-repo/jfrogtest/golang-alpine.tar

      - id: trivy-scan
        name: Scan with Trivy
        uses: cloudbees-io/trivy-plugin@v1
        with:
          binary-tar-path: /cloudbees/workspace/golang-alpine.tar

      - id: print-trivy-outputs
        name: Print trivy outputs
        uses: docker://alpine:latest
        run: |
          echo "Trivy outputs:"
          echo "Critical: ${{ steps.trivy-scan.outputs.critical-count }}"
          echo "Very high: ${{ steps.trivy-scan.outputs.very-high-count }}"
          echo "High: ${{ steps.trivy-scan.outputs.high-count }}"
          echo "Medium: ${{ steps.trivy-scan.outputs.medium-count }}"
          echo "Low: ${{ steps.trivy-scan.outputs.low-count }}"
          echo "Policy Subject: ${{ steps.trivy-scan.outputs.policy-subject }}"
          echo "CLOUDBEES_OUTPUTS directory: $CLOUDBEES_OUTPUTS"

      # Printing policy subject details for testing purpose
      - id: print-policy-subject
        name: Print Policy subject
        uses: docker://alpine:latest
        run: |

          echo "=== Files in /cloudbees/workspace/policy-store ==="                                                                                                                              
          find "/cloudbees/workspace/policy-store" -type f | while read file; do                                                                                                               
            echo ""                                                                                                                                                               
            echo "File: $file"                                                                                                                                                    
            cat "$file"                                                                                                                                                           
            echo "---"                                                                                                                                                            
          done